    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

        const SETS = [
          { name: "SET 1", songs: ["Pride & Joy","Bad Moon Rising","Cold Shot","Whitehouse Rd.","Crazy Mama","Broken Window Serenade","Rock-n-Roll Allnite","Blue On Black","Like a Rolling Stone","Satisfied"] },
          { name: "SET 2", songs: ["Straight to Hell","I Thank You","Red House","Black Magic Woman","Oye Como Va","Wild Side","Melissa","Peaceful Easy Feeling","Tues. Gone","No Matter What"] },
          { name: "SET 3", songs: ["Green River","Call Me the Breeze","On the Road Again","Use Me","Cabin Down Below","Feel Like Makin' Love","Little Wing","Love Struck Baby"] },
          { name: "SET 4", songs: ["Rebel Rebel","Hey Joe","Tues. Gone","Bad Leroy Brown","Midnite Special","Blister in the Sun","Louie Louie","Wagon Wheel"] }
        ];

        const SONG_LIBRARY = [
          { genre: "🔵 Blues & Soul", songs: ["Pride & Joy (SRV)","Cold Shot (SRV)","Love Struck Baby (SRV)","Red House (Hendrix)","Hey Joe (Hendrix)","Little Wing (Hendrix)","Use Me (Bill Withers)","I Thank You (Sam & Dave / ZZ Top)"] },
          { genre: "🌱 Southern Rock & Country", songs: ["Bad Moon Rising (CCR)","Green River (CCR)","Midnite Special (CCR)","Whitehouse Rd. (Tyler Childers)","If Whisky Could Talk (Tyler Childers)","Tues. Gone (Lynyrd Skynyrd)","Call Me the Breeze (JJ Cale)","On the Road Again (Willie Nelson)","Melissa (Allman Brothers)","Can't You See (Marshall Tucker)","Whisky Bent & Hellbound (Hank Jr.)"] },
          { genre: "🎸 Classic Rock & Party", songs: ["Black Magic Woman / Oye Como Va (Santana)","Like a Rolling Stone (Bob Dylan)","Peaceful Easy Feeling (Eagles)","Rebel Rebel (David Bowie)","Blister in the Sun (Violent Femmes)","Louie Louie (The Kingsmen)","Rock-n-Roll Allnite (KISS)","Feel Like Makin' Love (Bad Company)","Cabin Down Below (Tom Petty)","Straight to Hell (Drivin N Cryin)","Wagon Wheel (OCMS / Darius Rucker)"] }
        ];

        const CAPTIONS = [
          { song: "Midnight Special 🚂", text: "Let the Midnight Special shine its light! 🪵 Law hitting those CCR notes tonight—the GIG is officially rolling. See y'all at the bar! #MidnightSpecial #CCR #ItDontMatter #GIGGIN" },
          { song: "Love Struck Baby 🎸", text: "Bruce channeling pure SRV grit on 'Love Struck Baby' tonight! ⚡️ That Texas blues shuffle keeps the floor moving. #SRV #BluesShuffle #ItDontMatter #GIGGIN" },
          { song: "Straight to Hell 🥃", text: "Drivin' N' Cryin' vibes in Gwinnett! 🍻 Taking it 'Straight to Hell' with Law and the guys tonight. Pull up an extra barstool! #StraightToHell #ItDontMatter #GIGGIN" },
          { song: "Pride & Joy 🌅", text: "Nothing like watching Bruce channel the SRV spirit on 'Pride & Joy'. The whole room feels it. 🎸 Come see it live! #PrideAndJoy #SRV #ItDontMatter" },
          { song: "Wagon Wheel 🎶", text: "Nothing like a whole crowd singing along to 'Wagon Wheel'! 🪕 Law and the guys brought the heat. Come see it live! #WagonWheel #ItDontMatter #GIGGIN" },
          { song: "Louie Louie 🕺", text: "Always an absolute party the second 'Louie Louie' starts up! 🥳 Spirit's alive and family is here. See you down front! #LouieLouie #IDM #GIGGIN" },
          { song: "Cabin Down Below 🪵", text: "Mountain air and 'Cabin Down Below' vibes. 🌲 Throwback to Lawrence doing Tom Petty proud. This one always hits different. #TomPetty #CabinDown Below #GIGGIN" },
          { song: "Cold Shot 🧊", text: "Bruce digging deep into 'Cold Shot' tonight. 🎸 That heavy SRV grit is in the DNA of this band. Come feel it live! #ColdShot #SRV" }
        ];

          Hype: "Gwinnett County, pull up! 🤠 The guys are geared up and bringing the noise tonight!",
          Legacy: "Thinking back on those unforgettable nights. Allie's spirit is always right here with us.",
          Booking: "Now routing weekend dates for the quarter! Bring that signature energy to your venue."
        };

        function App() {
          const [activeTab, setActiveTab] = useState("generator");
          const [activeSet, setActiveSet] = useState("");
          const [selectedSong, setSelectedSong] = useState("");
          const [selectedSlogan, setSelectedSlogan] = useState("");
          const [generatedText, setGeneratedText] = useState("");

          const handleGenerate = () => {
            let parts = [];
            if (activeSet) parts.push(`We're hitting you with ${activeSet} tonight!`);
            if (selectedSong) {
              const capObj = CAPTIONS.find(c => c.song === selectedSong);
              if (capObj) parts.push(capObj.text);
            }
            if (selectedSlogan) parts.push(SLOGANS[selectedSlogan]);
            setGeneratedText(parts.join("\n\n"));
          };

          const TABS = [
            { id: "generator", label: "Caption Generator" },
            { id: "library", label: "Song Sets" }
          ];

          return (
            <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#F5F0E8", minHeight: "100vh" }}>
              <style>{`
                @import url('https://googleapis.com');
                * { box-sizing: border-box; margin: 0; padding: 0; }
                select, button, textarea { font-family: inherit; }
              `}</style>

              {/* Header Design */}
              <div style={{ background: "#0D0D0D", padding: "16px 20px 8px", position: "sticky", top: 0, zIndex: 100 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", maxWidth: "1100px", margin: "0 auto", paddingBottom: "12px" }}>
                  <div>
                    <div style={{ fontSize: "9px", letterSpacing: "0.35em", color: "#C9A84C", textTransform: "uppercase", marginBottom: "2px", fontWeight: 600 }}>Giggin' HQ Dashboard</div>
                    <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: "clamp(26px, 5vw, 36px)", color: "#FFFFFF", lineHeight: 1, letterSpacing: "0.02em" }}>
                      Livin' the <span style={{ color: "#C9A84C" }}>Dream</span>
                    </div>
                  </div>
                </div>

                {/* Dashboard Navigation Tabs */}
                <div style={{ maxWidth: "1100px", margin: "0 auto", overflowX: "auto", display: "flex", gap: "24px" }}>
                  {TABS.map(t => (
                    <button 
                      key={t.id} 
                      onClick={() => setActiveTab(t.id)}
                      style={{
                        fontFamily: "'Bebas Neue', cursive",
                        fontSize: "15px",
                        letterSpacing: "0.05em",
                        background: "none",
                        border: "none",
                        color: activeTab === t.id ? "#C9A84C" : "#8E8E93",
                        padding: "6px 0 10px",
                        cursor: "pointer",
                        borderBottom: activeTab === t.id ? "2px solid #C9A84C" : "2px solid transparent",
                        transition: "all 0.2s ease"
                      }}
                    >
                      {t.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Main Workspace Interface */}
              <div style={{ maxWidth: "1100px", margin: "0 auto", padding: "28px 16px" }}>
                {activeTab === "generator" ? (
                  <div style={{ background: "#FFFFFF", padding: "24px", borderRadius: "12px", boxShadow: "0 4px 20px rgba(0,0,0,0.05)" }}>
                    <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: "20px", color: "#0D0D0D", marginBottom: "16px" }}>Build Promotional Social Copy</h3>
                    
                    <label style={{ display: "block", fontSize: "12px", color: "#8E8E93", fontWeight: 600, marginBottom: "6px", textTransform: "uppercase" }}>1. Active Set Focus (Optional)</label>
                    <select onChange={(e) => setActiveSet(e.target.value)} style={{ width: "100%", padding: "12px", marginBottom: "20px", borderRadius: "6px", border: "1px solid #E5E5EA", fontSize: "14px" }}>
                      <option value="">-- No Set Focus --</option>
                      {SETS.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                    </select>

                    <label style={{ display: "block", fontSize: "12px", color: "#8E8E93", fontWeight: 600, marginBottom: "6px", textTransform: "uppercase" }}>2. Select Song Context Highlight</label>
                    <select onChange={(e) => setSelectedSong(e.target.value)} style={{ width: "100%", padding: "12px", marginBottom: "20px", borderRadius: "6px", border: "1px solid #E5E5EA", fontSize: "14px" }}>
                      <option value="">-- Choose Featured Song Track --</option>
                      {CAPTIONS.map(c => <option key={c.song} value={c.song}>{c.song}</option>)}
                    </select>

                    <label style={{ display: "block", fontSize: "12px", color: "#8E8E93", fontWeight: 600, marginBottom: "6px", textTransform: "uppercase" }}>3. Select Structural Slogan Hook</label>
                    <select onChange={(e) => setSelectedSlogan(e.target.value)} style={{ width: "100%", padding: "12px", marginBottom: "24px", borderRadius: "6px", border: "1px solid #E5E5EA", fontSize: "14px" }}>
                      <option value="">-- Select Promotional Slogan --</option>
                      {Object.keys(SLOGANS).map(k => <option key={k} value={k}>{k}</option>)}
                    </select>

                    <button onClick={handleGenerate} style={{ width: "100%", padding: "14px", background: "#0D0D0D", color: "#C9A84C", border: "none", borderRadius: "6px", fontSize: "15px", fontFamily: "'Bebas Neue', cursive", letterSpacing: "0.06em", cursor: "pointer" }}>Generate Media Package Copy</button>

                    {generatedText && (
                      <div style={{ marginTop: "24px", background: "#F9F6F0", padding: "20px", borderRadius: "8px", border: "1px solid #EAE4D8" }}>
                        <h4 style={{ color: "#0D0D0D", fontSize: "14px", fontWeight: 600, marginBottom: "10px" }}>Ready Clipboard Output:</h4>
                        <textarea readOnly value={generatedText} style={{ width: "100%", height: "120px", padding: "12px", borderRadius: "4px", border: "1px solid #E5E5EA", background: "#FFF", fontSize: "14px", lineHeight: "1.5", resize: "none" }} />
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: "20px" }}>
                    {SETS.map(s => (
                      <div key={s.name} style={{ background: "#FFFFFF", padding: "20px", borderRadius: "12px", boxShadow: "0 4px 20px rgba(0,0,0,0.05)" }}>
                        <h3 style={{ fontFamily: "'Bebas Neue', cursive", fontSize: "20px", color: "#C9A84C", borderBottom: "1px solid #F5F0E8", paddingBottom: "8px", marginBottom: "12px" }}>{s.name} Roster</h3>
                        <ul style={{ listStyleType: "none" }}>
                          {s.songs.map((song, i) => (
                            <li key={i} style={{ fontSize: "14px", color: "#3A3A3C", padding: "6px 0", borderBottom: i === s.songs.length - 1 ? "none" : "1px dashed #F2F2F7" }}>{song}</li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
